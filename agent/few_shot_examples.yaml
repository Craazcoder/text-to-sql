examples:
  - question: "Top 5 product categories by revenue"
    sql: >
      SELECT p.category_name, SUM(o.order_total_usd) AS revenue
      FROM fact_orders o
      JOIN dim_products p ON o.product_id = p.product_id
      WHERE o.order_status = 'delivered'
      GROUP BY p.category_name
      ORDER BY revenue DESC
      LIMIT 5;

  - question: "Average review score by seller state"
    sql: >
      SELECT s.seller_state, AVG(r.review_score) AS avg_score
      FROM fact_orders o
      JOIN dim_sellers s ON o.seller_id = s.seller_id
      JOIN dim_reviews r ON o.order_id = r.order_id
      GROUP BY s.seller_state
      ORDER BY avg_score DESC;